<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Explorador APOD NASA</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div class="contenedor-principal">
        <header class="encabezado">
            <h1>Explorador APOD de la NASA</h1>
            <p>Consulta la foto astronómica del día y guarda tus favoritas</p>
        </header>

        <section class="panel panel-controles">
            <div class="fila-controles">
                <label for="campoFechaBusqueda">Buscar por fecha:</label>
                <input type="date" id="campoFechaBusqueda" />
                <button id="botonBuscarApod" class="boton boton-buscar">Buscar APOD</button>
                <button id="botonGuardarFavorito" class="boton boton-guardar">Guardar en favoritos</button>
            </div>
            <p id="mensajeError" class="mensaje-error"></p>
        </section>
        
        <section class="panel panel-apod">
            <p id="fechaApodActual" class="fecha-apod"></p>
            <div id="contenedorImagen-Video" class="contenedor-imagen-o-video"></div>
            <p id="explicacionApodActual" class="explicacion-apod"></p>
        </section>

        <section class="panel panel-favoritos">
            <h2>Favoritos guardados</h2>
            <div id="listaDeFavoritos" class="lista-favoritos"></div>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
