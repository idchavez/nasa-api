<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Explorador APOD NASA</title>

  <!-- Bootstrap CSS por CDN -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

 
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="contenedor-principal container py-4 py-md-5">
    <!-- Encabezado -->
    <header class="encabezado text-center mb-4">
      <h1 class="mb-2">Explorador APOD de la NASA</h1>
      <p class="mb-0">
        Consulta imágenes astronómicas por fecha y guarda tus favoritas.
      </p>
    </header>

    <!-- Panel de búsqueda -->
    <section class="panel mb-4">
      <div class="row g-3 align-items-end">
        <div class="col-12 col-md-4">
          <label for="campoFechaBusqueda" class="form-label mb-2">
            Buscar por fecha
          </label>
          <input
            type="date"
            id="campoFechaBusqueda"
            class="form-control"
          >
        </div>

        <div class="col-12 col-sm-6 col-md-4">
          <button
            id="botonBuscarApod"
            class="boton boton-buscar btn w-100"
            type="button"
          >
            Buscar APOD
          </button>
        </div>

        <div class="col-12 col-sm-6 col-md-4">
          <button
            id="botonGuardarFavorito"
            class="boton boton-guardar btn w-100"
            type="button"
          >
            Guardar en favoritos
          </button>
        </div>
      </div>
    </section>

    <!-- Panel principal  -->
    <section class="panel mb-4">
      <div class="row">
        <div class="col-12">
          <h2 class="titulo-apod h4 mb-2">Astronomy Picture of the Day</h2>
          <p id="fechaApodActual" class="fecha-apod mb-3"></p>
        </div>

        <div class="col-12">
          <div id="contenedorImagen-Video" class="contenedor-imagen-o-video"></div>
        </div>

        <div class="col-12">
          <p id="explicacionApodActual" class="explicacion-apod mb-0"></p>
        </div>
      </div>
    </section>

    <!-- Favoritos -->
    <section class="panel">
      <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
        <h2 class="h4 mb-0">Favoritos guardados</h2>
      </div>

      
      <div
        id="listaDeFavoritos"
        class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 g-3"
      ></div>
    </section>
  </main>

  
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
  ></script>

 
  <script src="app.js"></script>
</body>
</html>
